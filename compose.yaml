name: paddleocr-vl

services:
  paddleocr-vlm-server:
    image: ${VLLM_IMAGE:-ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlepaddle/paddleocr-genai-vllm-server:latest-nvidia-gpu}
    command:
      - paddleocr
      - genai_server
      - --model_name
      - ${VLLM_SERVER_MODEL_NAME:-PaddleOCR-VL-1.6-0.9B}
      - --host
      - 0.0.0.0
      - --port
      - "8118"
      - --backend
      - vllm
      - --backend_config
      - /opt/paddleocr/vllm_config.yaml
    volumes:
      - ./deploy/vllm_config.yaml:/opt/paddleocr/vllm_config.yaml:ro
      - model-cache:/root/.cache
    shm_size: 8gb
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      start_period: 10m
      interval: 15s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      args:
        PADDLEOCR_IMAGE: ${API_BASE_IMAGE:-ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlepaddle/paddleocr-vl:latest-nvidia-gpu}
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      PUBLIC_API_KEY: ${PUBLIC_API_KEY:?Set PUBLIC_API_KEY in .env}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      VLLM_API_KEY: ${VLLM_API_KEY:-EMPTY}
      VLLM_SERVER_URL: ${VLLM_SERVER_URL:-http://paddleocr-vlm-server:8118/v1}
      VLLM_MODEL_NAME: ${VLLM_MODEL_NAME:-PaddleOCR-VL-1.6-0.9B}
      PIPELINE_VERSION: ${PIPELINE_VERSION:-v1.6}
      LAYOUT_MODEL_NAME: ${LAYOUT_MODEL_NAME:-PP-DocLayoutV2}
      VL_REC_MAX_CONCURRENCY: ${VL_REC_MAX_CONCURRENCY:-1}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-100}
      MAX_PAGES: ${MAX_PAGES:-100}
      DELETE_TEMP_FILES: ${DELETE_TEMP_FILES:-true}
      UPLOAD_DIR: ${UPLOAD_DIR:-/data/uploads}
      OUTPUT_DIR: ${OUTPUT_DIR:-/data/outputs}
    volumes:
      - app-data:/data
      - model-cache:/root/.cache
    shm_size: 8gb
    restart: unless-stopped
    depends_on:
      paddleocr-vlm-server:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      start_period: 5m
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  app-data:
  model-cache:
