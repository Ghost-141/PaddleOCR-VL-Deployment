name: paddleocr-vl

services:
  model-setup:
    build:
      context: .
      args:
        PADDLEOCR_IMAGE: ${API_BASE_IMAGE:-ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlepaddle/paddleocr-vl:latest-nvidia-gpu-offline}
    user: root
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ./models:/models
      - huggingface-cache:/root/.cache
    command: ["bash", "/app/scripts/download_models.sh"]

  paddleocr-vlm-server:
    image: ${VLLM_IMAGE:-ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlepaddle/paddleocr-genai-vllm-server:latest-nvidia-gpu-offline}
    user: root
    command:
      - paddleocr
      - genai_server
      - --model_name
      - PaddleOCR-VL-1.6-0.9B
      - --host
      - 0.0.0.0
      - --port
      - "8118"
      - --backend
      - vllm
      - --backend_config
      - /opt/paddleocr/vllm_config.yaml
    volumes:
      - ./deploy/vllm_config.yaml:/opt/paddleocr/vllm_config.yaml:ro
    environment:
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
    shm_size: 8gb
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8118/health || exit 1"]
      start_period: 10m
      interval: 15s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      args:
        PADDLEOCR_IMAGE: ${API_BASE_IMAGE:-ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlepaddle/paddleocr-vl:latest-nvidia-gpu-offline}
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      PUBLIC_API_KEY: ${PUBLIC_API_KEY:?Set PUBLIC_API_KEY in .env}
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
      VLLM_API_KEY: ${VLLM_API_KEY:-EMPTY}
      DEVICE: ${DEVICE:-gpu:0}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-100}
      MAX_PAGES: ${MAX_PAGES:-100}
    volumes:
      - app-data:/data
      - ./models:/models:ro
    shm_size: 8gb
    restart: unless-stopped
    depends_on:
      model-setup:
        condition: service_completed_successfully
      paddleocr-vlm-server:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      start_period: 5m
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  app-data:
  huggingface-cache:
